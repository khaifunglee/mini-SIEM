# Accept logs from Filebeat on port 5044
input {
  beats {
    port => 5044
  }
}

filter {
  # -----------------------------
  # PARSE SSH AUTHENTICATION LOGS
  # -----------------------------
  if "ssh" in [tags] {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:auth_timestamp} %{HOSTNAME:hostname} sshd\[%{POSINT:sshd_pid}\]: %{WORD:auth_result} password for (invalid user )?%{USERNAME:username} from %{IP:source_IP} port %{POSINT:source_port}"
      }
      add_tag => ["parsed_ssh"]
      tag_on_failure => ["_grokparsefailure_ssh"]
    }

    # Convert port to integer
    if [source_port] {
      mutate {
        convert => { "source_port" => "integer" }
      }
    }

    # Tag failed authentication attempts
    if [auth_result] == "Failed" {
      mutate {
        add_tag => ["auth_failure"]
        add_field => { "security_event" => "failed_authentication" }
        add_field => { "severity" => "medium" }
      }
    }

    # Tag successful authentication attempts
    if [auth_result] == "Accepted" {
      mutate {
        add_tag => ["auth_success"]
        add_field => { "security_event" => "successful_authentication" }
      }
    }

    # Tag notable users (e.g root, admin, postgres)
    if [username] in ["root", "admin", "postgres"] {
      mutate {
        add_tag => ["privileged_account"]
        add_field => { "account_type" => "privileged" }
      }
    }

    # Tag internal & external IPs (not in 192.168.x.x or 10.x.x.x)
    if [source_IP] !~ /^(192\.168\.|10\.)/ {
      mutate {
        add_tag => ["external_ip"]
        add_field => { "ip_type" => "external" }
      }

      # Increase severity level for failed logins from external IPs
      if "auth_failure" in [tags] {
        mutate {
          replace => { "severity" => "high" }
        }
      }
    } else {
      mutate {
        add_field => { "ip_type" => "internal" }
      }
    }

    # Tag failed privileged accounts from external IPs
    if [account_type] == "privileged" and [ip_type] == "external" and "auth_failure" in [tags] {
      mutate {
        add_tag => ["critical_security_event"]
        replace => { "severity" => "critical" }
        add_field => { "alert" => "Attempted privileged account access from external IP" }
      }
    }
  }

  # ---------------------
  # PARSE WEB ACCESS LOGS
  # ---------------------
  if "web" in [tags] {
    grok {
      match => {
        "message" => '%{IP:client_ip} -- \[%{HTTPDATE:http_timestamp\] "%{WORD:http_method} %{URIPATHPARAM:request_path} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:bytes_sent} - "%{DATA:user_agent}"'
      }
      add_tag => ["parsed_web"]
      tag_on_failure => ["_grokparsefailure_web"]
    }

    # Convert numeric fields to integer
    if [response_code] {
      mutate {
        convert => {
          "response_code" => "integer"
          "bytes_sent" => "integer"
        }
      }
    }

    # Tag HTTP errors
    if [response_code] >= 400 and [response_code] < 500 {
      mutate {
        add_tag => ["client_error"]
        add_field => { "error_category" => "client_error" }
        add_field => { "severity" => "medium" }
      }
    }
    if [response_code] >= 500 {
      mutate {
        add_tag => ["server_error"]
        add_field => { "error_category" => "server_error" }
        add_field => { "severity" => "medium" }
      }
    }
    if [response_code] == 404 {
      mutate {
        add_tag => ["not_found"]
      }
    }

    # Tag sensitive paths
    if [request_path] =~ /admin|config|\.env|wp-admin/ {
      mutate {
        add_tag => ["sensitive_path"]
        add_field => { "path_category" => "sensitive" }
      }
    }

    # Tag path traversal attempts (looks for ../ or ..\)
    if [request_path] =~ /\.\./|\.\.\\/ {
      mutate {
        add_tag => ["path_traversal", "attack_attempt"]
        add_field => {
          "security_event" => "path_traversal_attempt"
          "severity" => "high"
          "attack_type" => "path_traversal"
        }
      }
    }

    # Tag scanning tools in user agents (?i = case insenstive)
    if [user_agent] =~ /(?i)(nmap|nikto|sqlmap|burp|metasploit|masscan)/ {
      mutate {
        add_tag => ["scanning_tool", "attack_attempt"]
        add_field => {
          "security_event" => "security_scanner_detected"
          "severity" => "high"
          "attack_type" => "reconnaisance"
        }
      }
    }

    # Tag attack tool accessing sensitive path
    if "scanning_tool" in [tags] and "sensitive_path" in [tags] {
      mutate {
        add_tag => ["critical_security_event"]
        replace => { "severity" => "critical" }
        add_field => { "alert" => "Attack tool detected accessing sensitive resources" }
      }
    }
  }
  
  # ----------------------
  # PARSE APPLICATION LOGS
  # ----------------------
  if "application" in [tags] {
    # From Filebeat config
    grok { 
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:app_timestamp\] \[%{WORD:log_level}\] %{GREEDYDATA:log_message}"
      }
      add_tag => ["parsed_app"]
      tag_on_failure => ["_grokparsefailure_app"]
    }

    # Tag error logs
    if [log_level] == "ERROR" {
      mutate {
        add_tag => ["application_error"]
        add_field => { "severity" => "medium" } 
      }
    }
  }
}

# Forward logs to Elasticsearch
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
  }
  # Also output to console for debugging (parsed fields will be displayed)
  stdout { 
    codec => rubydebug {
      metadata => false
    }
  }
}